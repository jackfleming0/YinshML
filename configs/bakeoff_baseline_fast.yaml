version: 1

# Ultra-lean Track A bake-off baseline. 8 sims × 1 worker × 3 games × 5 iters.
# ~15 min per iter → ~75 min per run. Run multiple times to triangulate.

device: auto
num_iterations: 10
save_dir: runs/bakeoff_baseline

self_play:
  evaluation_mode: hybrid
  heuristic_weight: 0.3
  heuristic_weight_start: 0.3
  heuristic_weight_end: 0.3
  heuristic_weight_anneal_iterations: 0
  num_simulations: 16
  late_simulations: 16
  simulation_switch_ply: 20
  c_puct: 1.0
  dirichlet_alpha: 0.3
  value_weight: 1.0
  max_depth: 300
  use_batched_mcts: true
  mcts_batch_size: 32
  enable_subtree_reuse: false
  fpu_reduction: 0.0
  epsilon_mix_start: 0.25
  epsilon_mix_end: 0.25
  epsilon_mix_taper_moves: 0
  initial_temp: 1.0
  final_temp: 0.1
  annealing_steps: 30
  temp_clamp_fraction: 0.6
  num_workers: 1
  games_per_iteration: 5

trainer:
  batch_size: 64
  l2_reg: 0.0
  lr: 0.001
  value_head_lr_factor: 5.0
  value_loss_weights: [0.5, 0.5]
  discrimination_weight: 0.5
  epochs_per_iteration: 2
  batches_per_epoch: auto
  max_buffer_size: 5000
  ema_decay: null
  use_ema_for_eval: false
  lr_schedule: step
  warmup_epochs: 0
  enable_autocast: false
  soft_value_target_sigma: 0.0

augmentation:
  enabled: true
  max_augmentations: 4

arena:
  games_per_match: 10
  promotion_threshold: 0.55
  tournament_sliding_window: 3
  eval_seed: null

export:
  export_every: 0
  coreml_dir: models/coreml
