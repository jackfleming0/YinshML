version: 1

# Ultra-lean Track A bake-off challenger. All Track A features ON.
# Matched budget: 8 sims × 1 worker × 3 games × 5 iters.
# Should be FASTER per-game than baseline (subtree reuse + autocast).

device: auto
num_iterations: 10
save_dir: runs/bakeoff_challenger

self_play:
  evaluation_mode: hybrid
  heuristic_weight: 0.3
  # MATCHED to baseline for fair bake-off at short horizon. The curriculum
  # (1.0→0.0 over N iters) is a Track A feature but it's scale-sensitive:
  # at 10 iters the heuristic drops to 0 by iter 5, leaving the last 5 iters
  # with an undertrained neural-only policy. Hold constant 0.3 like baseline.
  heuristic_weight_start: 0.3
  heuristic_weight_end: 0.3
  heuristic_weight_anneal_iterations: 0
  num_simulations: 16
  late_simulations: 16
  simulation_switch_ply: 20
  c_puct: 1.0
  dirichlet_alpha: 0.3
  value_weight: 1.0
  max_depth: 300
  use_batched_mcts: true
  mcts_batch_size: 32
  enable_subtree_reuse: true
  fpu_reduction: 0.25
  epsilon_mix_start: 0.25
  epsilon_mix_end: 0.0
  epsilon_mix_taper_moves: 20
  initial_temp: 1.0
  final_temp: 0.1
  annealing_steps: 30
  temp_clamp_fraction: 0.6
  num_workers: 1
  games_per_iteration: 5

trainer:
  batch_size: 64
  l2_reg: 0.0
  lr: 0.001
  value_head_lr_factor: 5.0
  value_loss_weights: [0.5, 0.5]
  discrimination_weight: 0.5
  epochs_per_iteration: 2
  batches_per_epoch: auto
  max_buffer_size: 5000
  ema_decay: 0.999
  use_ema_for_eval: true
  # MATCHED to baseline for fair bake-off at short horizon. Cosine decays
  # LR to near-zero by epoch 18 of a 20-epoch run (33× lower than StepLR),
  # starving the last 2-3 iters of learning signal. StepLR is the fair
  # comparator at this scale.
  lr_schedule: step
  warmup_epochs: 0
  enable_autocast: true
  soft_value_target_sigma: 0.5

augmentation:
  enabled: true
  max_augmentations: 4

arena:
  games_per_match: 10
  promotion_threshold: 0.55
  tournament_sliding_window: 3
  eval_seed: 20260416

export:
  export_every: 0
  coreml_dir: models/coreml
