# branchD1_gap_mcts200.yaml — Branch D.1: GAP value head swap.
#
# Controlled comparison to wave3_branchC_mcts200.yaml. The ONE variable
# changed: `network.value_head_type: gap` (vs the implicit 'spatial' baseline).
# Everything else — MCTS-200 self-play, MCTS-100 late, 100 games/iter,
# 5 iters, base LR 1e-4 cosine, EMA 0.999, Wilson 0.20 promotion gate,
# anchor-skip iter 1 — matches Branch C exactly so the SPRT screen vs
# frozen `best_iter_4` attributes any delta to the head swap alone.
#
# Hypothesis (VOLUME_PRETRAIN_RESULTS.md §2 Branch D.1): the spatial-flatten
# value head (~4M params: Flatten(64*11*11) → 512 → 256 → 7) is the documented
# overfitting trap across KataGo / Leela / AlphaZero. The GAP head (~17K
# params: 1x1 conv → BN → ReLU → AdaptiveAvgPool2d(1) → Linear(64, 7),
# 252x fewer head params, ~14% reduction in total model size) should produce
# value targets the trunk can actually learn from, raising the ceiling Step 2
# (MCTS-400) couldn't.
#
# Warm-start: --init-checkpoint models/yngine_volume_pretrain/best_supervised.pt
# loads the trunk + policy + outcome_values; the spatial-head keys silently
# drop (shape mismatch); the GAP head freshly initializes. See
# yinsh_ml/network/wrapper.py::load_model and
# yinsh_ml/tests/test_gap_value_head.py::TestGapWarmStartFromSpatial.
#
# Screening: scripts/eval_vs_frozen_anchor.py --sprt --sprt-p1 0.60 vs
# `best_iter_4`. STRONGER promotion bar.

version: 1
device: auto
num_iterations: 5
save_dir: runs_branchD1

network:
  value_head_type: gap   # <-- THE D.1 KNOB (everything else mirrors Branch C)

self_play:
  evaluation_mode: hybrid
  heuristic_weight: 0.3
  heuristic_weight_start: 0.5
  heuristic_weight_end: 0.0
  heuristic_weight_anneal_iterations: 5
  num_simulations: 200       # Branch C MCTS-200 baseline
  late_simulations: 100
  simulation_switch_ply: 20
  c_puct: 1.0
  dirichlet_alpha: 0.3
  value_weight: 1.0
  max_depth: 150
  use_batched_mcts: true
  mcts_batch_size: 64
  enable_subtree_reuse: true
  fpu_reduction: 0.25
  epsilon_mix_start: 0.25
  epsilon_mix_end: 0.0
  epsilon_mix_taper_moves: 20
  epsilon_mix_iteration_start: 1.0
  epsilon_mix_iteration_end: 0.3
  initial_temp: 1.0
  final_temp: 0.1
  annealing_steps: 30
  temp_clamp_fraction: 0.6
  # GPU lever battle-tested at MCTS-400 (Step 2): 2.84x speedup, 0 worker crashes
  # across 500 games + anchor evals + tournaments. Set from the start.
  num_workers: 4
  # use_shared_evaluator: false  # Tier-A parity cleared the path (logs/tier_a_parity.json,
  # 2026-05-23) but parity-check needed PR validation on CUDA before flipping default.
  # Leaving off for D.1 to keep the controlled comparison maximally clean —
  # one variable at a time.
  use_shared_evaluator: false
  games_per_iteration: 100

trainer:
  batch_size: 256
  l2_reg: 0.0
  lr: 0.0001
  value_head_lr_factor: 5.0
  value_loss_weights: [0.5, 0.5]
  discrimination_weight: 0.0
  epochs_per_iteration: 1
  batches_per_epoch: auto
  max_buffer_size: 100000
  ema_decay: 0.999
  use_ema_for_eval: true
  lr_schedule: cosine
  warmup_epochs: 1
  enable_autocast: true
  soft_value_target_sigma: 0.5
  search_consistency:
    enabled: true
  max_oversampling: 4.0

phase_weights:
  RING_PLACEMENT: 1.0
  MAIN_GAME: 2.0
  RING_REMOVAL: 0.5

augmentation:
  enabled: true
  max_augmentations: 4

arena:
  games_per_match: 100
  promotion_threshold: 0.20
  tournament_sliding_window: 3
  eval_seed: 20260518
  revert_self_play_on_gate_failure: true
  gate_revert_on_mtime_mismatch: fail
  eval_report_both_modes: true
  raw_policy_temperature: 0.5

export:
  export_every: 5
  coreml_dir: models/coreml

anchor:
  enabled: true
  num_games: 40
  depth: 1
  seed: 1337
  max_moves_per_game: 150
  skip_first_n_iterations: 1
