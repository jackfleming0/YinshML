version: 1

# Diagnostic short training config (B2 recipe, halved sims and iters for speed).
# Purpose: produce checkpoints for the white-wins-100% investigation
# (see INVESTIGATION_PLAN.md). NOT a tuning run — outputs are graded
# by the eval battery downstream, not by their final ELO.
#
# Differences from configs/post_bitboard_tuning_b2.yaml:
#   - num_iterations: 20 → 10
#   - num_simulations: 200 → 100
#   - late_simulations: 128 → 64
#   - Otherwise identical (heuristic floor 0.5, step LR, sliding window 2)
#
# Expected wall-clock on cloud: ~90 minutes.

device: auto
num_iterations: 10
save_dir: runs

self_play:
  use_cpp_engine: true
  evaluation_mode: hybrid
  heuristic_weight: 0.3
  heuristic_weight_start: 1.0
  heuristic_weight_end: 0.5
  heuristic_weight_anneal_iterations: 10
  num_simulations: 100
  late_simulations: 64
  simulation_switch_ply: 20
  c_puct: 1.0
  dirichlet_alpha: 0.3
  value_weight: 1.0
  max_depth: 300
  use_batched_mcts: true
  mcts_batch_size: 32
  enable_subtree_reuse: true
  fpu_reduction: 0.25
  epsilon_mix_start: 0.25
  epsilon_mix_end: 0.0
  epsilon_mix_taper_moves: 20
  initial_temp: 1.0
  final_temp: 0.1
  annealing_steps: 30
  temp_clamp_fraction: 0.6
  num_workers: 1                      # serial self-play; bypasses multiprocessing-spawn
                                      # CUDA-init failures seen on fresh vast.ai images
  games_per_iteration: 100

trainer:
  batch_size: 256
  l2_reg: 0.0
  lr: 0.001
  value_head_lr_factor: 5.0
  value_loss_weights: [0.5, 0.5]
  discrimination_weight: 0.5
  epochs_per_iteration: 4
  batches_per_epoch: auto
  max_buffer_size: 200000
  ema_decay: null
  use_ema_for_eval: false
  lr_schedule: step
  warmup_epochs: 4
  enable_autocast: true
  soft_value_target_sigma: 0.5
  search_consistency:
    enabled: false
    policy_weight: 0.1
    value_weight: 1.0
    every_k_steps: 10
    long_sims: 64
    batch_size: 32
    warmup_iters: 3

  checkpoint_retention_count: 0   # keep all checkpoints for the eval battery

phase_weights:
  RING_PLACEMENT: 1.0
  MAIN_GAME: 2.0
  RING_REMOVAL: 0.5

augmentation:
  enabled: true
  max_augmentations: 4

arena:
  games_per_match: 50
  promotion_threshold: 0.55
  tournament_sliding_window: 2
  eval_seed: 20260505

anchor:
  enabled: false
  num_games: 20
  depth: 3
  seed: 1337
  max_moves_per_game: 200
  skip_first_n_iterations: 1
  mcts_enabled: true
  mcts_simulations: 32

export:
  export_every: 999   # disable CoreML export — diagnostic only
  coreml_dir: models/coreml

difficulty_presets:
  easy:
    num_simulations: 50
    temperature: 1.0
    c_puct: 1.0
  medium:
    num_simulations: 150
    temperature: 0.5
    c_puct: 1.25
  hard:
    num_simulations: 400
    temperature: 0.1
    c_puct: 1.5
