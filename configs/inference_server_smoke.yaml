# inference_server_smoke.yaml — perf check for the E20 process-based
# inference server (yinsh_ml/network/inference_server.py).
#
# WHAT THIS MEASURES
#   Whether routing N worker *processes* through one GPU-resident coalescing
#   server breaks the GPU-command-queue ceiling that capped the per-worker
#   path at ~1250 games/hr (4 workers) and regressed past it. Workers keep no
#   CUDA context; only the server does -> no command-queue serialization.
#
# HOW TO USE (on the rented 4090/5090 box)
#   1. Build the C++ engine first (it's gitignored):
#        pip install -e . && python setup.py build_ext --inplace
#   2. Baseline the current peak (serial), then this path, then sweep workers:
#        python scripts/run_training.py --config configs/cloud_run_v1.yaml      # serial baseline
#        python scripts/run_training.py --config configs/inference_server_smoke.yaml
#      then re-run with num_workers in {4, 8, 12, 16} (edit below) and read the
#      "Final rate: X games/second" line each path prints. Watch GPU util with
#      profiling/symmetry_run or nvidia-smi dmon -s u — the win shows up as
#      sm_avg climbing from ~15% toward the server's coalesced throughput.
#   3. Compare games/hr vs the serial baseline AND vs use_shared_evaluator
#      (the threaded path) to confirm the process path beats both.
#
# This is a 2-iter perf check, not a training run — numbers, not a model.

version: 1
device: auto
num_iterations: 2
save_dir: runs_inference_server_smoke

self_play:
  evaluation_mode: hybrid
  heuristic_weight: 0.3
  heuristic_weight_start: 0.5
  heuristic_weight_end: 0.0
  heuristic_weight_anneal_iterations: 2
  num_simulations: 48
  late_simulations: 32
  simulation_switch_ply: 20
  c_puct: 1.0
  dirichlet_alpha: 0.3
  value_weight: 1.0
  max_depth: 150
  use_batched_mcts: true
  mcts_batch_size: 64

  # --- The levers under test ---
  num_workers: 8                          # sweep {4, 8, 12, 16}; was the contention knob
  use_cpp_engine: true                    # C++ board engine (verified wired; defaults off in prod configs)
  use_inference_server: true              # process-based coalescing server (this experiment)
  inference_server_max_wait_ms: 1.0       # server batch-fill wait; raise to 2-3 for bigger coalesced batches
  use_shared_evaluator: false             # mutually exclusive with the above

  enable_subtree_reuse: true
  fpu_reduction: 0.25
  epsilon_mix_start: 0.25
  epsilon_mix_end: 0.0
  epsilon_mix_taper_moves: 20
  initial_temp: 1.0
  final_temp: 0.1
  annealing_steps: 30
  temp_clamp_fraction: 0.6
  games_per_iteration: 200

trainer:
  batch_size: 256
  l2_reg: 0.0
  lr: 0.001
  value_head_lr_factor: 5.0
  value_loss_weights:
  - 0.5
  - 0.5
  discrimination_weight: 0.5
  epochs_per_iteration: 1                  # minimal — this is a self-play throughput check
  batches_per_epoch: auto
  max_buffer_size: 100000
  ema_decay: 0.999
  use_ema_for_eval: true
  lr_schedule: cosine
  warmup_epochs: 0
  enable_autocast: true
  soft_value_target_sigma: 0.5

phase_weights:
  RING_PLACEMENT: 1.0
  MAIN_GAME: 2.0
  RING_REMOVAL: 0.5

augmentation:
  enabled: true
  max_augmentations: 4

arena:
  games_per_match: 6
  promotion_threshold: 0.55
  tournament_sliding_window: 3
  eval_seed: 20260609
  revert_self_play_on_gate_failure: true

export:
  export_every: 0
  coreml_dir: models/coreml

anchor:
  enabled: false
