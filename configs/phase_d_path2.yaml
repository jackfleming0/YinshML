# Phase D — Path 2: blast the regression with deep MCTS + lots of games.
#
# Phase D's lr_conservative-scaled-up run regressed cleanly at 20-game
# anchor: peak 50% at iter 3-4, crashing to 0-10% by iter 15-25. The
# recipe knobs from Phase C don't fix the iter-3-4 regression.
#
# Hypothesis: the regression isn't fixable by SHRINKING gradient steps.
# It's caused by training on bad MCTS targets that come from a too-
# shallow search. AlphaZero used 800 sims/move; we've been running 96.
# At 96 sims, the visit distribution is dominated by the network's own
# policy prior — so as the prior gets worse from self-play noise, the
# MCTS targets get worse, and the network gets worse. Bootstrap death
# spiral.
#
# Path 2 fix: deeper MCTS (good targets even from a weak network),
# more games per iter (data diversity), pinned heuristic weight (stable
# value signal across iterations). Compute is cheap (~$0.30/hr-effective)
# so we throw it at the problem instead of carefully tip-toeing.
#
#   num_simulations:      96  -> 256   (2.7× deeper, MCTS dominates the prior)
#   late_simulations:     64  -> 192
#   games_per_iteration:  50  -> 100   (2× more diverse data per iter)
#   max_buffer_size:    100K  -> 300K  (proportional)
#   heuristic_weight pinned at 0.5 (no anneal) — stable signal
#
# Keep lr / epochs reasonable (5e-4, 2 epochs) — quality targets
# justify normal training, not tiny steps.
#
# Cost-bounded at 30 iters: if anchor doesn't stay above ~40% by iter 15+,
# this confirms the regression is structural (network architecture or
# training-loop bug, not hyperparameters), and we ship the iter-4
# checkpoint from runs_phase_d as the project deliverable.
#
# Estimated cost on RTX 4090: ~30 min/iter × 30 iters = ~15 hrs ≈ \$5.50.
version: 1
device: auto
num_iterations: 30
save_dir: runs_phase_d_path2

self_play:
  evaluation_mode: hybrid
  heuristic_weight: 0.5
  heuristic_weight_start: 0.5    # PATH 2: pinned, no anneal
  heuristic_weight_end: 0.5      # PATH 2: pinned (was 0.0 elsewhere)
  heuristic_weight_anneal_iterations: 0
  num_simulations: 256           # PATH 2: 96 -> 256 (deep MCTS targets)
  late_simulations: 192          # PATH 2: 64 -> 192
  simulation_switch_ply: 20
  c_puct: 1.0
  dirichlet_alpha: 0.3
  value_weight: 1.0
  max_depth: 300
  use_batched_mcts: true
  mcts_batch_size: 32
  enable_subtree_reuse: true
  fpu_reduction: 0.25
  epsilon_mix_start: 0.25
  epsilon_mix_end: 0.0
  epsilon_mix_taper_moves: 20
  initial_temp: 1.0
  final_temp: 0.1
  annealing_steps: 30
  temp_clamp_fraction: 0.6
  num_workers: 6
  games_per_iteration: 100        # PATH 2: 50 -> 100 (more data diversity)

trainer:
  batch_size: 256
  l2_reg: 0.0
  lr: 0.0005                      # lr_conservative level — good targets
                                  # justify normal training rate
  value_head_lr_factor: 5.0
  value_loss_weights:
  - 0.5
  - 0.5
  discrimination_weight: 0.5
  epochs_per_iteration: 2         # back up to 2 — better data, train it
  batches_per_epoch: auto
  max_buffer_size: 300000         # PATH 2: 100K -> 300K
  ema_decay: 0.999
  use_ema_for_eval: true
  lr_schedule: cosine
  warmup_epochs: 20
  enable_autocast: true
  soft_value_target_sigma: 0.5
  search_consistency:
    enabled: false
    policy_weight: 0.1
    value_weight: 1.0
    every_k_steps: 10
    long_sims: 64
    batch_size: 32
    warmup_iters: 3

phase_weights:
  RING_PLACEMENT: 1.0
  MAIN_GAME: 2.0
  RING_REMOVAL: 0.5

augmentation:
  enabled: true
  max_augmentations: 4

arena:
  games_per_match: 80
  promotion_threshold: 0.55
  tournament_sliding_window: 3
  eval_seed: 20260415

export:
  export_every: 30
  coreml_dir: models/coreml

difficulty_presets:
  easy:
    num_simulations: 50
    temperature: 1.0
    c_puct: 1.0
  medium:
    num_simulations: 150
    temperature: 0.5
    c_puct: 1.25
  hard:
    num_simulations: 400
    temperature: 0.1
    c_puct: 1.5

anchor:
  enabled: true
  num_games: 20                   # 20-game CI ~±20pt — clean signal
  depth: 1
  seed: 1337
  max_moves_per_game: 150
  skip_first_n_iterations: 2
