version: 1

# Phase D warm-start cloud run (peer plan, 2026-04-26).
#
# Run with:
#   python scripts/run_training.py \
#       -c configs/phase_d_warmstart.yaml \
#       --init-checkpoint <path-to-supervised-checkpoint.pt>
#
# Differences from training.yaml that the peer's plan calls for:
#   - 12 iterations (was 50). Successful warm-start runs show meaningful
#     signal by iter 3-6 per RESEARCH_LOG; 12 gives margin without burning
#     budget on a regression we'd rather catch early.
#   - games_per_iteration: 100 (was 50). RESEARCH_LOG says 100 is the min
#     viable diversity regime.
#   - ema_decay: null + use_ema_for_eval: false. EMA was masking live-weight
#     trajectories in the prior runs; with the joint-update fix we want to
#     read live numbers directly.
#   - heuristic curriculum 1.0 → 0.0 over 10 iters (was 0.5 → 0.0). Start
#     close to the supervised distribution, roll off as the value head
#     re-anchors.
#   - anchor.num_games: 40 + arena.games_per_match: 100. Tighter Wilson CI
#     on both signals.
#   - anchor.mcts_enabled: true. MCTS-vs-anchor is the primary strength
#     metric; raw-policy anchor still runs as a diagnostic.

device: auto
num_iterations: 12
save_dir: runs

self_play:
  evaluation_mode: hybrid
  heuristic_weight: 0.3
  heuristic_weight_start: 1.0
  heuristic_weight_end: 0.0
  heuristic_weight_anneal_iterations: 10
  num_simulations: 96
  late_simulations: 64
  simulation_switch_ply: 20
  c_puct: 1.0
  dirichlet_alpha: 0.3
  value_weight: 1.0
  max_depth: 300
  use_batched_mcts: true
  mcts_batch_size: 32
  enable_subtree_reuse: true
  fpu_reduction: 0.25
  epsilon_mix_start: 0.25
  epsilon_mix_end: 0.0
  epsilon_mix_taper_moves: 20
  initial_temp: 1.0
  final_temp: 0.1
  annealing_steps: 30
  temp_clamp_fraction: 0.6
  num_workers: 3
  games_per_iteration: 100

trainer:
  batch_size: 256
  l2_reg: 0.0
  lr: 0.001
  value_head_lr_factor: 5.0
  value_loss_weights: [0.5, 0.5]
  discrimination_weight: 0.5
  epochs_per_iteration: 4
  batches_per_epoch: auto
  max_buffer_size: 100000  # ~6 iters × 100 games × 80 moves ≈ 48k; 100k absorbs the curriculum.
  ema_decay: null
  use_ema_for_eval: false
  lr_schedule: cosine
  warmup_epochs: 4         # ~10% of 12 × 4 = 48 epochs.
  enable_autocast: true
  soft_value_target_sigma: 0.5
  search_consistency:
    enabled: false         # Reserve as the fallback if iter 6+ still collapses.
    policy_weight: 0.1
    value_weight: 1.0
    every_k_steps: 10
    long_sims: 64
    batch_size: 32
    warmup_iters: 3

phase_weights:
  RING_PLACEMENT: 1.0
  MAIN_GAME: 2.0
  RING_REMOVAL: 0.5

augmentation:
  enabled: true
  max_augmentations: 4

arena:
  games_per_match: 100
  promotion_threshold: 0.55
  tournament_sliding_window: 3
  eval_seed: 20260426

anchor:
  enabled: true
  num_games: 40
  depth: 3
  seed: 1337
  max_moves_per_game: 200
  skip_first_n_iterations: 1
  mcts_enabled: true
  mcts_simulations: 96     # Match self-play sim budget so anchor and self-play
                           # see the same level of search; raise for stronger eval.

export:
  export_every: 4
  coreml_dir: models/coreml

difficulty_presets:
  easy:
    num_simulations: 50
    temperature: 1.0
    c_puct: 1.0
  medium:
    num_simulations: 150
    temperature: 0.5
    c_puct: 1.25
  hard:
    num_simulations: 400
    temperature: 0.1
    c_puct: 1.5
