version: 1

# Short post-bitboard regression check.
# = configs/phase_d_warmstart_long.yaml with two changes:
#   - num_iterations: 30 → 10        (cheap regression check, not full run)
#   - self_play.use_cpp_engine: true (the thing we're regression-testing)
#
# Goal: confirm the C++ engine + 4 optimization layers don't silently
# regress training dynamics. Trajectory shape over 10 iters is enough to
# catch gross regressions; full 30-iter run is overkill for a check.
#
# Expected: ~5-6h on cloud (~1.86× py/cpp ratio applied to sim=96 mix,
# where NN forward dominates so per-iter savings are smaller than peak).
# Compare per-iter ELO trajectory shape and final tournament results to
# the first 10 iters of the prior phase_d_warmstart_long run.
#
# See POST_BITBOARD_TRAINING_BRIEF.md for context.

device: auto
num_iterations: 10
save_dir: runs

self_play:
  use_cpp_engine: true                        # the thing under test
  evaluation_mode: hybrid
  heuristic_weight: 0.3
  heuristic_weight_start: 1.0
  heuristic_weight_end: 0.0
  heuristic_weight_anneal_iterations: 20
  num_simulations: 96
  late_simulations: 64
  simulation_switch_ply: 20
  c_puct: 1.0
  dirichlet_alpha: 0.3
  value_weight: 1.0
  max_depth: 300
  use_batched_mcts: true
  mcts_batch_size: 32
  enable_subtree_reuse: true
  fpu_reduction: 0.25
  epsilon_mix_start: 0.25
  epsilon_mix_end: 0.0
  epsilon_mix_taper_moves: 20
  initial_temp: 1.0
  final_temp: 0.1
  annealing_steps: 30
  temp_clamp_fraction: 0.6
  num_workers: 3
  games_per_iteration: 100

trainer:
  batch_size: 256
  l2_reg: 0.0
  lr: 0.001
  value_head_lr_factor: 5.0
  value_loss_weights: [0.5, 0.5]
  discrimination_weight: 0.5
  epochs_per_iteration: 4
  batches_per_epoch: auto
  max_buffer_size: 200000
  ema_decay: null
  use_ema_for_eval: false
  lr_schedule: cosine
  warmup_epochs: 4
  enable_autocast: true
  soft_value_target_sigma: 0.5
  search_consistency:
    enabled: false
    policy_weight: 0.1
    value_weight: 1.0
    every_k_steps: 10
    long_sims: 64
    batch_size: 32
    warmup_iters: 3

  checkpoint_retention_count: 0

phase_weights:
  RING_PLACEMENT: 1.0
  MAIN_GAME: 2.0
  RING_REMOVAL: 0.5

augmentation:
  enabled: true
  max_augmentations: 4

arena:
  games_per_match: 50
  promotion_threshold: 0.55
  tournament_sliding_window: 2
  eval_seed: 20260428

anchor:
  enabled: false
  num_games: 20
  depth: 3
  seed: 1337
  max_moves_per_game: 200
  skip_first_n_iterations: 1
  mcts_enabled: true
  mcts_simulations: 32

export:
  export_every: 6
  coreml_dir: models/coreml

difficulty_presets:
  easy:
    num_simulations: 50
    temperature: 1.0
    c_puct: 1.0
  medium:
    num_simulations: 150
    temperature: 0.5
    c_puct: 1.25
  hard:
    num_simulations: 400
    temperature: 0.1
    c_puct: 1.5
