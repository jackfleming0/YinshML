version: 1

# Post-bitboard tuning run B2: hold the heuristic anchor + keep LR alive.
# = configs/post_bitboard_tuning_b1.yaml with two single-variable changes:
#   - heuristic_weight_end: 0.0 → 0.5     (never fully drop the heuristic)
#   - lr_schedule: cosine → step          (~0.43× LR at end vs ~0× under cosine;
#                                          true 'constant' isn't a valid value)
#
# Diagnosis from B1 (runs/20260502_121803):
#   - Best model: iter 3 (ELO 1693), final iter 19 (ELO 1433)
#   - At iter 3, heuristic_weight ≈ 0.85; at iter 19, ≈ 0.05
#   - Network appears to lean on the heuristic anchor; as anneal removes it,
#     performance regresses. Compounded by cosine LR decaying to ~0 by epoch 80,
#     freezing the network in the second half of the run.
#
# Hypothesis B2 falsifies:
#   "If we keep some heuristic anchor AND keep LR alive, ELO should climb
#    monotonically and the iter-19 checkpoint should beat or match iter 3."
#
# Stop / read signals:
#   - iter-19 ELO ≥ iter-3 ELO → diagnosis correct, B2 recipe is the new floor
#   - Trajectory still peaks early → network capacity / value head architecture
#     is the bottleneck, not training dynamics
#   - Trajectory flattens (no peak, no decline) → at minimum we've stabilized,
#     can isolate variables more cleanly next run
#
# Cloud kickoff:
#   python scripts/run_training.py --config configs/post_bitboard_tuning_b2.yaml \
#       2>&1 | tee cloud_logs/post_bitboard_b2_$(date -u +%Y%m%dT%H%M%S).log
#
# Budget: ~6h on cloud (same as B1; LR/anneal changes have no perf cost).

device: auto
num_iterations: 20
save_dir: runs

self_play:
  use_cpp_engine: true
  evaluation_mode: hybrid
  heuristic_weight: 0.3
  heuristic_weight_start: 1.0
  heuristic_weight_end: 0.5                 # was 0.0 — keep half-strength anchor
  heuristic_weight_anneal_iterations: 20
  num_simulations: 200
  late_simulations: 128
  simulation_switch_ply: 20
  c_puct: 1.0
  dirichlet_alpha: 0.3
  value_weight: 1.0
  max_depth: 300
  use_batched_mcts: true
  mcts_batch_size: 32
  enable_subtree_reuse: true
  fpu_reduction: 0.25
  epsilon_mix_start: 0.25
  epsilon_mix_end: 0.0
  epsilon_mix_taper_moves: 20
  initial_temp: 1.0
  final_temp: 0.1
  annealing_steps: 30
  temp_clamp_fraction: 0.6
  num_workers: 3
  games_per_iteration: 100

trainer:
  batch_size: 256
  l2_reg: 0.0
  lr: 0.001
  value_head_lr_factor: 5.0
  value_loss_weights: [0.5, 0.5]
  discrimination_weight: 0.5
  epochs_per_iteration: 4
  batches_per_epoch: auto
  max_buffer_size: 200000
  ema_decay: null
  use_ema_for_eval: false
  lr_schedule: step                         # was cosine — keep LR alive (final ≈ 0.43× initial)
  warmup_epochs: 4
  enable_autocast: true
  soft_value_target_sigma: 0.5
  search_consistency:
    enabled: false
    policy_weight: 0.1
    value_weight: 1.0
    every_k_steps: 10
    long_sims: 64
    batch_size: 32
    warmup_iters: 3

  checkpoint_retention_count: 0

phase_weights:
  RING_PLACEMENT: 1.0
  MAIN_GAME: 2.0
  RING_REMOVAL: 0.5

augmentation:
  enabled: true
  max_augmentations: 4

arena:
  games_per_match: 50
  promotion_threshold: 0.55
  tournament_sliding_window: 2
  eval_seed: 20260428

anchor:
  enabled: false
  num_games: 20
  depth: 3
  seed: 1337
  max_moves_per_game: 200
  skip_first_n_iterations: 1
  mcts_enabled: true
  mcts_simulations: 32

export:
  export_every: 6
  coreml_dir: models/coreml

difficulty_presets:
  easy:
    num_simulations: 50
    temperature: 1.0
    c_puct: 1.0
  medium:
    num_simulations: 150
    temperature: 0.5
    c_puct: 1.25
  hard:
    num_simulations: 400
    temperature: 0.1
    c_puct: 1.5
