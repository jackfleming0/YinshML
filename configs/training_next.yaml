version: 1
device: auto
num_iterations: 50
save_dir: runs
self_play:
  num_simulations: 96
  late_simulations: 64
  simulation_switch_ply: 20
  c_puct: 1.0
  dirichlet_alpha: 0.3
  value_weight: 1.0
  max_depth: 300
  initial_temp: 1.0
  final_temp: 0.1
  annealing_steps: 30
  temp_clamp_fraction: 0.6
  num_workers: auto
  games_per_iteration: 50
trainer:
  batch_size: 256
  l2_reg: 0.0
  lr: 0.001
  value_head_lr_factor: 5.0
  value_loss_weights:
  - 0.5
  - 0.5
  epochs_per_iteration: 4
  batches_per_epoch: auto
arena:
  games_per_match: 200
  promotion_threshold: 0.55
export:
  export_every: 5
  coreml_dir: models/coreml
difficulty_presets:
  easy:
    num_simulations: 50
    temperature: 1.0
    c_puct: 1.0
  medium:
    num_simulations: 150
    temperature: 0.5
    c_puct: 1.25
  hard:
    num_simulations: 400
    temperature: 0.1
    c_puct: 1.5
