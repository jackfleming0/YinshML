# warm_start_deep_b.yaml — 5-iter RL from deep_256x18 supervised init.
#
# Same ablation_b recipe as warm_start_sup_combined.yaml but starting
# from deep_256x18 (256-channel, 18-block, basic 6-ch encoding).
#
# Init: models/supervised_deep_256x18/best_supervised.pt
#   - 6.2% MAIN top-1 (vs sup_combined's 5.5%)
#   - 37% stochastic strength at MCTS @ 400 + temp=0.5 (best in entire run)
#   - val_mse 0.98 (only model to beat baseline)
#
# Requires run_training.py to pass model_path to NetworkWrapper for the
# auto-detect to fire on 256x18 arch (commit e3d935b).
#
# Hypothesis: starting from the strongest possible supervised model
# minimizes the destruction-distance and gives the best chance of
# preservation. If even deep_256x18 hits MAIN top-1 < 2.7% by iter 5,
# the recipe is structurally destructive at any init.

version: 1
device: auto
num_iterations: 5
save_dir: runs_warm_start_deep_b

self_play:
  evaluation_mode: hybrid
  heuristic_weight: 0.3
  heuristic_weight_start: 0.5
  heuristic_weight_end: 0.0
  heuristic_weight_anneal_iterations: 5
  num_simulations: 48
  late_simulations: 32
  simulation_switch_ply: 20
  c_puct: 1.0
  dirichlet_alpha: 0.3
  value_weight: 1.0
  max_depth: 150
  use_batched_mcts: true
  mcts_batch_size: 64
  enable_subtree_reuse: true
  fpu_reduction: 0.25
  epsilon_mix_start: 0.25
  epsilon_mix_end: 0.0
  epsilon_mix_taper_moves: 20
  initial_temp: 1.0
  final_temp: 0.1
  annealing_steps: 30
  temp_clamp_fraction: 0.6
  num_workers: 0
  use_shared_evaluator: false
  games_per_iteration: 200

trainer:
  batch_size: 256
  l2_reg: 0.0
  lr: 0.001
  value_head_lr_factor: 5.0
  value_loss_weights: [0.5, 0.5]
  discrimination_weight: 0.0
  epochs_per_iteration: 4
  batches_per_epoch: auto
  max_buffer_size: 100000
  ema_decay: 0.999
  use_ema_for_eval: true
  lr_schedule: cosine
  warmup_epochs: 10
  enable_autocast: true
  soft_value_target_sigma: 0.5
  search_consistency:
    enabled: false

phase_weights:
  RING_PLACEMENT: 1.0
  MAIN_GAME: 2.0
  RING_REMOVAL: 0.5

augmentation:
  enabled: true
  max_augmentations: 4

arena:
  games_per_match: 20
  promotion_threshold: 0.55
  tournament_sliding_window: 3
  eval_seed: 20260511
  revert_self_play_on_gate_failure: true

export:
  export_every: 5
  coreml_dir: models/coreml

anchor:
  enabled: true
  num_games: 4
  depth: 1
  seed: 1337
  max_moves_per_game: 150
  skip_first_n_iterations: 1
