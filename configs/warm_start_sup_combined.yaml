# warm_start_sup_combined.yaml — 5-iter RL warm-start probe.
#
# Init from: models/supervised_combined/best_supervised.pt
#   (256x12 basic-encoding supervised model trained on BGA + boardspace
#    human games; 5.5% MAIN top-1 on held-out, prior best supervised baseline)
#
# Recipe: same as ablation_b_no_discrimination.yaml (the discrimination=0
# winner from the prior writeup). discrimination_weight=0.0, hybrid eval,
# 48 sims, value_head_lr_factor=5.0, final_temp=0.1.
#
# Run with:
#   python scripts/run_training.py \
#       -c configs/warm_start_sup_combined.yaml \
#       --init-checkpoint models/supervised_combined/best_supervised.pt
#
# Hypothesis under test:
#   The prior warm_start experiment from iter_2 RL winner went 60/60 → 0/60
#   in 1 iter and was labeled "training destroys strong policies." That
#   reading is suspect now — the iter_2 "winner" was a deterministic argmax
#   line that got disrupted by self-play training (not actual policy
#   destruction). Starting from a supervised model with broader expert-agreement
#   strength (4.7-5.5% MAIN top-1) tells us: does RL pull it toward the
#   same brittle-argmax 60/60 mode, or does it preserve broader competence?
#
# Pass criterion: at iter 5, raw policy at temp=0.5 should still beat
# the supervised baseline's temp=0.5 (17-30% from batch 2 v2). If it goes
# to 0% under stochastic eval, RL is collapsing the policy regardless of
# the strength of the init.
#
# Wall clock + cost: ~2h, ~$1.

version: 1
device: auto
num_iterations: 5
save_dir: runs_warm_start_sup_combined

self_play:
  evaluation_mode: hybrid
  heuristic_weight: 0.3
  heuristic_weight_start: 0.5
  heuristic_weight_end: 0.0
  heuristic_weight_anneal_iterations: 5
  num_simulations: 48
  late_simulations: 32
  simulation_switch_ply: 20
  c_puct: 1.0
  dirichlet_alpha: 0.3
  value_weight: 1.0
  max_depth: 150
  use_batched_mcts: true
  mcts_batch_size: 64
  enable_subtree_reuse: true
  fpu_reduction: 0.25
  epsilon_mix_start: 0.25
  epsilon_mix_end: 0.0
  epsilon_mix_taper_moves: 20
  initial_temp: 1.0
  final_temp: 0.1
  annealing_steps: 30
  temp_clamp_fraction: 0.6
  num_workers: 0
  use_shared_evaluator: false
  games_per_iteration: 200

trainer:
  batch_size: 256
  l2_reg: 0.0
  lr: 0.001
  value_head_lr_factor: 5.0
  value_loss_weights: [0.5, 0.5]
  discrimination_weight: 0.0          # ablation_b winner: no discrimination
  epochs_per_iteration: 4
  batches_per_epoch: auto
  max_buffer_size: 100000
  ema_decay: 0.999
  use_ema_for_eval: true
  lr_schedule: cosine
  warmup_epochs: 10
  enable_autocast: true
  soft_value_target_sigma: 0.5
  search_consistency:
    enabled: false

phase_weights:
  RING_PLACEMENT: 1.0
  MAIN_GAME: 2.0
  RING_REMOVAL: 0.5

augmentation:
  enabled: true
  max_augmentations: 4

arena:
  games_per_match: 20
  promotion_threshold: 0.55
  tournament_sliding_window: 3
  eval_seed: 20260511
  revert_self_play_on_gate_failure: true

export:
  export_every: 5
  coreml_dir: models/coreml

anchor:
  enabled: true
  num_games: 4
  depth: 1
  seed: 1337
  max_moves_per_game: 150
  skip_first_n_iterations: 1
