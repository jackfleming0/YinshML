# warm_start_sup_lowlr.yaml — 5-iter RL from supervised_combined with 10x lower LR.
#
# Same recipe as warm_start_sup_combined.yaml except lr: 0.001 -> 0.0001.
# Hypothesis: slower weight updates preserve more of the supervised init's
# broader policy distribution. If batch 4 destroyed the model in 1 iter via
# fast convergence to brittle argmax, a 10x slower LR might let it linger
# in the broad-policy basin for more iters.
#
# Pass criterion: at iter 5, MAIN top-1 holdout > 2.7% (random baseline)
# and stochastic strength > 13% (worst case in batch 4). If we beat both,
# slower LR is doing something useful. If we don't, the recipe is
# structurally destructive regardless of update size.

version: 1
device: auto
num_iterations: 5
save_dir: runs_warm_start_sup_lowlr

self_play:
  evaluation_mode: hybrid
  heuristic_weight: 0.3
  heuristic_weight_start: 0.5
  heuristic_weight_end: 0.0
  heuristic_weight_anneal_iterations: 5
  num_simulations: 48
  late_simulations: 32
  simulation_switch_ply: 20
  c_puct: 1.0
  dirichlet_alpha: 0.3
  value_weight: 1.0
  max_depth: 150
  use_batched_mcts: true
  mcts_batch_size: 64
  enable_subtree_reuse: true
  fpu_reduction: 0.25
  epsilon_mix_start: 0.25
  epsilon_mix_end: 0.0
  epsilon_mix_taper_moves: 20
  initial_temp: 1.0
  final_temp: 0.1
  annealing_steps: 30
  temp_clamp_fraction: 0.6
  num_workers: 0
  use_shared_evaluator: false
  games_per_iteration: 200

trainer:
  batch_size: 256
  l2_reg: 0.0
  lr: 0.0001                          # 10x LOWER than batch 4
  value_head_lr_factor: 5.0
  value_loss_weights: [0.5, 0.5]
  discrimination_weight: 0.0
  epochs_per_iteration: 4
  batches_per_epoch: auto
  max_buffer_size: 100000
  ema_decay: 0.999
  use_ema_for_eval: true
  lr_schedule: cosine
  warmup_epochs: 10
  enable_autocast: true
  soft_value_target_sigma: 0.5
  search_consistency:
    enabled: false

phase_weights:
  RING_PLACEMENT: 1.0
  MAIN_GAME: 2.0
  RING_REMOVAL: 0.5

augmentation:
  enabled: true
  max_augmentations: 4

arena:
  games_per_match: 20
  promotion_threshold: 0.55
  tournament_sliding_window: 3
  eval_seed: 20260511
  revert_self_play_on_gate_failure: true

export:
  export_every: 5
  coreml_dir: models/coreml

anchor:
  enabled: true
  num_games: 4
  depth: 1
  seed: 1337
  max_moves_per_game: 150
  skip_first_n_iterations: 1
