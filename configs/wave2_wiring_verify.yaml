# wave2_wiring_verify.yaml — minimal Step 1 wiring-verification recipe.
# Goal: in ~10 minutes on local MPS, produce metrics/iteration_*.json with all
# five Wave 2 gates populated (B1 effective_child_visits, B2 effective_batch_size,
# B3 policy_target_entropy_mean, eval/value_outcome_correlation/<cand>, and
# eval/deterministic_collapse_count). NOT a regression check — only a wiring
# check. Real recipe validation lives in warm_start_combined_recipe.yaml.
#
# Acceptance: after running, all five scalar series should appear in
# metrics/iteration_1.json with finite, sensible values.

version: 1
device: auto
num_iterations: 2  # need >= 2 so iter 1's anchor eval (B2 corr) fires.
save_dir: runs_wave2_wiring_verify

self_play:
  evaluation_mode: hybrid
  heuristic_weight: 0.3
  heuristic_weight_start: 0.5
  heuristic_weight_end: 0.0
  heuristic_weight_anneal_iterations: 5
  num_simulations: 16        # tiny — wiring check only
  late_simulations: 12
  simulation_switch_ply: 20
  c_puct: 1.0
  dirichlet_alpha: 0.3
  value_weight: 1.0
  max_depth: 80
  use_batched_mcts: true
  mcts_batch_size: 32
  enable_subtree_reuse: true
  fpu_reduction: 0.25
  epsilon_mix_start: 0.25
  epsilon_mix_end: 0.0
  epsilon_mix_taper_moves: 20
  epsilon_mix_iteration_start: 1.0
  epsilon_mix_iteration_end: 0.3
  initial_temp: 1.0
  final_temp: 0.1
  annealing_steps: 30
  temp_clamp_fraction: 0.6
  num_workers: 0
  use_shared_evaluator: false
  games_per_iteration: 6     # tiny

trainer:
  batch_size: 64             # smaller buffer-friendly batch
  l2_reg: 0.0
  lr: 0.0001
  value_head_lr_factor: 5.0
  value_loss_weights: [0.5, 0.5]
  discrimination_weight: 0.0
  epochs_per_iteration: 1
  batches_per_epoch: auto
  max_buffer_size: 5000
  ema_decay: 0.999
  use_ema_for_eval: true
  lr_schedule: cosine
  warmup_epochs: 1
  enable_autocast: true
  soft_value_target_sigma: 0.5
  search_consistency:
    enabled: true
  max_oversampling: 4.0

phase_weights:
  RING_PLACEMENT: 1.0
  MAIN_GAME: 2.0
  RING_REMOVAL: 0.5

augmentation:
  enabled: true
  max_augmentations: 4

arena:
  games_per_match: 4
  promotion_threshold: 0.55
  tournament_sliding_window: 2
  eval_seed: 20260513
  revert_self_play_on_gate_failure: true
  gate_revert_on_mtime_mismatch: fail
  eval_report_both_modes: true
  raw_policy_temperature: 0.5

export:
  export_every: 100  # never export in this short run
  coreml_dir: models/coreml

anchor:
  enabled: true
  num_games: 4
  depth: 1
  seed: 1337
  max_moves_per_game: 100
  skip_first_n_iterations: 1  # iter 1 is first one with anchor eval -> B2 corr fires there
