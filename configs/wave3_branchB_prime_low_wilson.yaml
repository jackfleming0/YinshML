# wave3_branchB_prime_low_wilson.yaml — Wave 3 Branch B' (Path 1 follow-up).
#
# Hypothesis under test: in Branch B, iter 1's 70% MCTS-48 (the run's peak)
# got Wilson-rejected (17/40 head-to-head, LB=0.285 < 0.55 threshold) and
# reverted. If we'd kept iter 1, iter 2's self-play would have used iter 1's
# stronger weights and the gain might have compounded.
#
# This config = wave3_branchB_epochs1.yaml with exactly one change:
#   arena.promotion_threshold: 0.55 -> 0.20
#
# That promotes any candidate whose Wilson 95% lower bound exceeds 0.20 —
# including iter 1 (LB=0.285). Effectively a "trust marginal candidates"
# regime: even when head-to-head is noisy, propagate them forward.
#
# Outcomes worth distinguishing:
#   - Iter 1 propagates: iters 2+ stay near 70%, mean > Branch B's 59.5%.
#     Wilson gate was the bottleneck.
#   - Iter 1 still loses to seed after another iter: iter 2 drops back to
#     ~60% even with iter 1's weights as starting point. Iter 1 was a fluke.

version: 1
device: auto
num_iterations: 5
save_dir: runs_wave3_branchB_prime

self_play:
  evaluation_mode: hybrid
  heuristic_weight: 0.3
  heuristic_weight_start: 0.5
  heuristic_weight_end: 0.0
  heuristic_weight_anneal_iterations: 5
  num_simulations: 48
  late_simulations: 32
  simulation_switch_ply: 20
  c_puct: 1.0
  dirichlet_alpha: 0.3
  value_weight: 1.0
  max_depth: 150
  use_batched_mcts: true
  mcts_batch_size: 64
  enable_subtree_reuse: true
  fpu_reduction: 0.25
  epsilon_mix_start: 0.25
  epsilon_mix_end: 0.0
  epsilon_mix_taper_moves: 20
  epsilon_mix_iteration_start: 1.0
  epsilon_mix_iteration_end: 0.3
  initial_temp: 1.0
  final_temp: 0.1
  annealing_steps: 30
  temp_clamp_fraction: 0.6
  num_workers: 0
  use_shared_evaluator: false
  games_per_iteration: 200

trainer:
  batch_size: 256
  l2_reg: 0.0
  lr: 0.0001
  value_head_lr_factor: 5.0
  value_loss_weights: [0.5, 0.5]
  discrimination_weight: 0.0
  epochs_per_iteration: 1
  batches_per_epoch: auto
  max_buffer_size: 100000
  ema_decay: 0.999
  use_ema_for_eval: true
  lr_schedule: cosine
  warmup_epochs: 1
  enable_autocast: true
  soft_value_target_sigma: 0.5
  search_consistency:
    enabled: true
  max_oversampling: 4.0

phase_weights:
  RING_PLACEMENT: 1.0
  MAIN_GAME: 2.0
  RING_REMOVAL: 0.5

augmentation:
  enabled: true
  max_augmentations: 4

arena:
  games_per_match: 20
  # W3 B' knob: was 0.55. Drops Wilson confidence requirement so iter 1's
  # 17/40 head-to-head (LB=0.285) would have passed. The point is to test
  # whether keeping the marginally-strong candidate propagates its strength.
  promotion_threshold: 0.20
  tournament_sliding_window: 3
  eval_seed: 20260517
  revert_self_play_on_gate_failure: true
  gate_revert_on_mtime_mismatch: fail
  eval_report_both_modes: true
  raw_policy_temperature: 0.5

export:
  export_every: 5
  coreml_dir: models/coreml

anchor:
  enabled: true
  num_games: 40
  depth: 1
  seed: 1337
  max_moves_per_game: 150
  skip_first_n_iterations: 1
