# Baseline Experiment 003 - Double Epochs
# Purpose: Test impact of increased training epochs (under-training hypothesis)
# Expected: If under-training is the issue, this should show significant improvement

name: baseline_003
description: "Double epochs (8 instead of 4) - tests under-training hypothesis"
iterations: 10

training:
  batch_size: 256
  epochs_per_iteration: 8  # CHANGED: 4 -> 8
  games_per_iteration: 100
  max_buffer_size: 10000
  batches_per_epoch: auto
  phase_weights:
    RING_PLACEMENT: 0.5
    MAIN_GAME: 2.0
    RING_REMOVAL: 0.5

optimizer:
  policy_lr: 0.001
  value_lr_factor: 5.0
  policy_weight_decay: 0.0001
  value_weight_decay: 0.001
  value_momentum: 0.9
  l2_reg: 0.0
  scheduler_type: step
  scheduler_step_size: 10
  scheduler_gamma: 0.9

mcts:
  early_simulations: 100
  late_simulations: 100
  simulation_switch_ply: 20
  c_puct: 1.0
  dirichlet_alpha: 0.3
  dirichlet_epsilon: 0.25
  max_depth: 500
  evaluation_mode: hybrid
  heuristic_weight: 0.7
  use_batched_mcts: true
  mcts_batch_size: 32

temperature:
  initial: 1.0
  final: 0.1
  annealing_steps: 30
  schedule: linear
  clamp_fraction: 0.6

value_head:
  mode: classification
  num_classes: 7
  discrimination_weight: 0.5

tournament:
  games_per_match: 40  # Increased from 20 to reduce ELO measurement noise
  promotion_threshold: 0.55

early_stop_enabled: false  # Disabled to allow full training runs
early_stop_elo_threshold: 1400
early_stop_patience: 5

verbosity: info
tensorboard_enabled: true
save_checkpoints: true
