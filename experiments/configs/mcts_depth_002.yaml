# MCTS Depth Experiment 002 - Double Simulations
# Purpose: Test impact of more MCTS simulations
# Baseline: baseline_004 + LR findings (value_lr_factor: 2.5)
# Change: simulations 100 -> 200 (double)
# Expected: Higher quality policy targets, better performance

name: mcts_depth_002
description: "Double MCTS sims (200) - tests higher quality search"
iterations: 10

training:
  batch_size: 256
  epochs_per_iteration: 4
  games_per_iteration: 100
  max_buffer_size: 20000
  batches_per_epoch: auto
  phase_weights:
    RING_PLACEMENT: 0.5
    MAIN_GAME: 2.0
    RING_REMOVAL: 0.5

optimizer:
  policy_lr: 0.001
  value_lr_factor: 2.5  # UPDATED from LR sensitivity findings
  policy_weight_decay: 0.0001
  value_weight_decay: 0.001
  value_momentum: 0.9
  l2_reg: 0.0
  scheduler_type: step
  scheduler_step_size: 10
  scheduler_gamma: 0.9

mcts:
  early_simulations: 200  # CHANGED: 100 -> 200 (double)
  late_simulations: 200   # CHANGED: 100 -> 200 (double)
  simulation_switch_ply: 20
  c_puct: 1.0
  dirichlet_alpha: 0.3
  dirichlet_epsilon: 0.25
  max_depth: 500
  evaluation_mode: hybrid
  heuristic_weight: 0.7
  use_batched_mcts: true
  mcts_batch_size: 32

temperature:
  initial: 1.0
  final: 0.1
  annealing_steps: 30
  schedule: linear
  clamp_fraction: 0.6

value_head:
  mode: classification
  num_classes: 7
  discrimination_weight: 0.5

tournament:
  games_per_match: 40
  promotion_threshold: 0.55

early_stop_enabled: false
verbosity: info
tensorboard_enabled: true
save_checkpoints: true
