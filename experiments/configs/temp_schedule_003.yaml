# Temperature Schedule Experiment 003 - Higher Final Temperature
# Purpose: Test impact of maintaining more exploration throughout
# Baseline: baseline_004 + LR findings + MCTS findings
# Change: final 0.1 -> 0.3 (more stochastic even at end)
# Expected: More diverse training data, possibly better generalization

name: temp_schedule_003
description: "Higher final temp (0.3) - maintains exploration throughout"
iterations: 10

training:
  batch_size: 256
  epochs_per_iteration: 4
  games_per_iteration: 100
  max_buffer_size: 20000
  batches_per_epoch: auto
  phase_weights:
    RING_PLACEMENT: 0.5
    MAIN_GAME: 2.0
    RING_REMOVAL: 0.5

optimizer:
  policy_lr: 0.001
  value_lr_factor: 2.5  # From LR sensitivity findings
  policy_weight_decay: 0.0001
  value_weight_decay: 0.001
  value_momentum: 0.9
  l2_reg: 0.0
  scheduler_type: step
  scheduler_step_size: 10
  scheduler_gamma: 0.9

mcts:
  early_simulations: 200  # From MCTS depth findings
  late_simulations: 200
  simulation_switch_ply: 20
  c_puct: 1.0
  dirichlet_alpha: 0.3
  dirichlet_epsilon: 0.25
  max_depth: 500
  evaluation_mode: hybrid
  heuristic_weight: 0.7
  use_batched_mcts: true
  mcts_batch_size: 32

temperature:
  initial: 1.0
  final: 0.3            # CHANGED: 0.1 -> 0.3 (higher final temp)
  annealing_steps: 30
  schedule: linear
  clamp_fraction: 0.6

value_head:
  mode: classification
  num_classes: 7
  discrimination_weight: 0.5

tournament:
  games_per_match: 40
  promotion_threshold: 0.55

early_stop_enabled: false
verbosity: info
tensorboard_enabled: true
save_checkpoints: true
